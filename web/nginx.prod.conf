# Production nginx: terminates TLS, redirects HTTP -> HTTPS, serves the SPA, and
# reverse-proxies /api to the api service. Certs are mounted at /etc/nginx/certs
# by docker-compose.prod.yml (operator-provided — e.g. Let's Encrypt's
# fullchain.pem + privkey.pem). The dev image's HTTP-only web/nginx.conf is
# replaced by this file at runtime.

# Send all plain HTTP to HTTPS.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the single-page app; fall back to index.html for any path.
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers for the served app.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        # Now that we serve HTTPS, instruct browsers to stick to it.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' https://accounts.google.com; connect-src 'self' https://accounts.google.com https://www.googleapis.com; frame-src https://accounts.google.com; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # Reverse-proxy API calls to the api service on the Docker network.
    # This makes the app same-origin, so no CORS is involved.
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
