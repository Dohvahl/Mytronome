server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the single-page app; fall back to index.html for any path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the api service on the Docker network.
    # This makes the app same-origin, so no CORS is involved.
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
