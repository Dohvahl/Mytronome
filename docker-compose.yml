# Local dev / demo stack — NOT for deployment. It publishes the API (5046) and
# MySQL (3306) ports and runs the API in Development (Scalar docs, auto-migrate)
# for convenience. To deploy, use docker-compose.prod.yml, which closes those off
# and terminates HTTPS.
services:
  mysql:
    image: mysql:8.0
    container_name: mytronome-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-p${MYSQL_ROOT_PASSWORD}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./preset-api
    container_name: mytronome-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Inside the Docker network the database host is the service name "mysql".
      ConnectionStrings__DefaultConnection: 'Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD}'
    ports:
      - '5046:8080'

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: mytronome-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  mysql-data:
