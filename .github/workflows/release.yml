name: release

# Build desktop installers for Windows/macOS/Linux on a version tag and upload
# them to a draft GitHub Release. Push a tag like v1.1.0 to trigger.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./desktop/src-tauri -> target

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MYTRONOME_GOOGLE_CLIENT_ID: ${{ secrets.MYTRONOME_GOOGLE_CLIENT_ID }}
          MYTRONOME_GOOGLE_CLIENT_SECRET: ${{ secrets.MYTRONOME_GOOGLE_CLIENT_SECRET }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: Mytronome ${{ github.ref_name }}
          releaseDraft: true
          args: ${{ matrix.args }}

  android:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./desktop/src-tauri -> target
      - run: npm ci
      - name: Generate Android project
        run: npm run tauri -w desktop -- android init
      - name: Configure release signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
          cat > desktop/src-tauri/gen/android/keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          keyAlias=mytronome
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEYSTORE_PASSWORD
          EOF
          cat desktop/android-signing.gradle.kts >> desktop/src-tauri/gen/android/app/build.gradle.kts
      - name: Build signed APK
        run: npm run tauri -w desktop -- android build --apk
      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" desktop/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk --clobber
