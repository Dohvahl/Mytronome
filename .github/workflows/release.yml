name: release

# Build desktop installers for Windows/macOS/Linux on a version tag and upload
# them to a draft GitHub Release. Push a tag like v1.1.0 to trigger.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev libappindicator3-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./desktop/src-tauri -> target

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MYTRONOME_GOOGLE_CLIENT_ID: ${{ secrets.MYTRONOME_GOOGLE_CLIENT_ID }}
          MYTRONOME_GOOGLE_CLIENT_SECRET: ${{ secrets.MYTRONOME_GOOGLE_CLIENT_SECRET }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: Mytronome ${{ github.ref_name }}
          releaseDraft: true
          args: ${{ matrix.args }}
